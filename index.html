<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Sharing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #0070f3;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0051cc;
        }
        #shared-link {
            margin-top: 20px;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 5px;
            word-break: break-all;
        }
        #shared-link a {
            color: #0070f3;
            text-decoration: none;
        }
        #shared-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Share a Link</h1>
    <input type="url" id="link-input" placeholder="Enter a link to share..." />
    <button id="share-btn">Share Link</button>
    <div id="shared-link">No link shared yet</div>

    <script type="module" src="main.js"></script>
</body>
</html>
